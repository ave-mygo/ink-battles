services:
  backend:
    image: ${BACKEND_IMAGE:-ink-battles-backend:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ink-battles-backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.toml:/app/config.toml:ro
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - FRONTEND_ORIGIN=http://frontend:3000
      - APP_BASE_URL=https://ink-battles.couqie.moe
      - MONGODB_HOST=host.docker.internal
      - ALLOWED_ORIGINS=https://ink-battles.couqie.moe,http://localhost:3001
    depends_on:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  frontend:
    image: ${FRONTEND_IMAGE:-ink-battles-frontend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ink-battles-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - APP_BASE_URL=https://ink-battles.couqie.moe
      - NEXT_PUBLIC_API_BASE_URL=/api/v2
      - INTERNAL_API_BASE_URL=http://backend:3000/api/v2
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
