# =================================================================
# |                    配置文件 (config.toml)                        |
# =================================================================
#
# 说明:
# 1. 复制此文件并重命名为 config.toml
# 2. 将所有占位符替换为您的实际配置信息
# 3. 此文件包含敏感信息，请勿提交到版本控制
#

# -------------------------------------------------------------
# 系统模型配置
# -------------------------------------------------------------
[system_models.validator_gemini] # 带搜索的校验模型 (Gemini, Google GenAI SDK 原生调用)
api_key = "YOUR_VALIDATOR_API_KEY"
base_url = "https://api.openai.com/v1"
model = "gemini-3-flash-preview"

# -------------------------------------------------------------
# 带搜索的校验模型 (Gemini Lite, Google GenAI SDK 原生调用)
[system_models.validator_gemini_lite]
api_key = "YOUR_VALIDATOR_API_KEY"
base_url = "https://api.openai.com/v1"
model = "gemini-2.5-flash"

# -------------------------------------------------------------
# 带搜索的校验模型 (DeepSeek, OpenAI 兼容 SDK 普通调用)
[system_models.validator_deepseek_search]
api_key = "YOUR_VALIDATOR_API_KEY"
base_url = "https://api.openai.com/v1"
model = "deepseek-v4-flash-search"

# -------------------------------------------------------------
# 关闭搜索的校验模型 (GLM, OpenAI 兼容 SDK)
[system_models.validator_nosearch]
api_key = "YOUR_VALIDATOR_API_KEY"
base_url = "https://api.openai.com/v1"
model = "glm-4.7"

# -------------------------------------------------------------
# 评分模型凭证配置
# -------------------------------------------------------------
# 模型密钥、地址和真实模型名必须在服务启动前确定。
# 模型展示名、启用状态、会员标记、功能说明等运营配置会在首次启动时写入数据库，
# 后续请在管理员后台维护。
default_model = 0

# -------------------------------------------------------------
# 向量检索系统模型配置
# -------------------------------------------------------------
# 这里只保存模型调用所需的凭证、地址和真实模型名。
# 启用状态、展示名称、capability、召回/重排数量和排序权重由后台站点配置维护。
[system_models.embedding]
base_url = "https://api.example.com/v1"
api_key = "YOUR_EMBEDDING_API_KEY"
model = "text-embedding-3-small"

[system_models.rerank]
base_url = "https://api.example.com/v1"
api_key = "YOUR_RERANK_API_KEY"
model = "bge-reranker-v2-m3"

# -------------------------------------------------------------
# 服务端运行参数
# -------------------------------------------------------------
[server]
# 单次 JSON 请求体允许的最大字节数，超过后后端会直接拒绝请求。
max_json_body_bytes = 4194304
# 允许访问后端接口的站点来源列表，用于 CORS 和 CSRF 校验。
# 本地开发通常保留前端站点和后端站点两个地址即可。
allowed_origins = [
  "http://localhost:3000",
  "http://localhost:3001"
]

# -------------------------------------------------------------
# Auth 服务配置
# -------------------------------------------------------------
[auth]
host = "0.0.0.0"
port = 3100
mongodb_database = "ink_battles"
app_base_url = "http://localhost:3100"
default_return_url = "http://localhost:3000/dashboard"
allowed_return_origins = [ "http://localhost:3000" ]
allowed_origins = [
  "http://localhost:3000",
  "http://localhost:3101"
]
cookie_name = "auth-sso-token"
site_cookie_name = "auth-token"
cookie_domain = ""
cookie_secure = false
smtp_from_name = "Ink Battles"

[[grading_models]]
id = "gemini-3-pro-preview"
name = "Gemini 3 Pro"
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"
description = "专注于快速文本分析的轻量级模型，提供即时反馈和基础评析功能。"
model = "gemini-3-pro-preview"
enabled = true
premium = false
features = [
  "极致的响应速度",
  "轻量化设计",
  "基础文本分析",
  "即时反馈",
]
advantages = [
  "专为快速文本分析而设计，几乎没有等待延迟",
  "运行效率高，适合快速文本检查",
  "能够快速识别文本问题、评估流畅度并提供基础建议",
]
usageScenario = "定位于快速文本评析，适合对段落或短篇文本进行即时检查和分析，提供快速的文本质量反馈。"

# 可添加更多模型
# [[grading_models]]
# name = "GPT-4o"
# ...

# -------------------------------------------------------------
# MongoDB 配置
# -------------------------------------------------------------
[mongodb]
host = "localhost"
port = 27017
directConnection = true # 单节点连接模式（副本集设为 false）
# user = "admin"        # 可选，无认证时注释掉
# password = "password" # 可选，无认证时注释掉

# -------------------------------------------------------------
# 爱发电配置
# -------------------------------------------------------------
[afdian]
api_token = "YOUR_AFDIAN_API_TOKEN"
user_id = "YOUR_AFDIAN_USER_ID"
client_id = "YOUR_CLIENT_ID"
client_secret = "YOUR_CLIENT_SECRET"
redirect_uri = "https://auth.your-domain.com/api/auth/oauth/afdian/callback"

# -------------------------------------------------------------
# 内部 API 配置
# -------------------------------------------------------------
[api]
base_url = "https://newapi.yumetsuki.moe"
key = "YOUR_APP_API_KEY_SECRET"
user = 1

# -------------------------------------------------------------
# 邮件服务配置
# -------------------------------------------------------------
[email]
host = "smtp.example.com"
port = 465
user = "noreply@your-app.com"
password = "YOUR_EMAIL_PASSWORD"

# -------------------------------------------------------------
# JWT 配置
# -------------------------------------------------------------
[jwt]
secret = "YOUR_JWT_SECRET_KEY"

# -------------------------------------------------------------
# 管理员配置
# -------------------------------------------------------------
[admin]
# 管理员用户 UID 列表。UID 来自用户表，启动时加载。
users = []

# -------------------------------------------------------------
# 应用配置
# -------------------------------------------------------------
[app]
app_name = "Ink Battles"
base_url = "https://your-domain.com"
