name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docker-publish.yml"
      - "apps/**"
      - "config.example.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - "apps/**"
      - "config.example.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:
    inputs:
      service:
        description: "Service image to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - backend
          - auth

env:
  REGISTRY: ghcr.io
  CARGO_INCREMENTAL: "0"
  NEXT_TELEMETRY_DISABLED: "1"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      auth: ${{ steps.filter.outputs.auth }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - ".github/workflows/docker-publish.yml"
              - "apps/frontend/**"
              - "apps/shared/**"
              - "apps/frontend/Dockerfile"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "turbo.json"
            backend:
              - ".github/workflows/docker-publish.yml"
              - "apps/backend/**"
              - "apps/shared/**"
              - "apps/backend/Dockerfile"
              - "config.example.toml"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "turbo.json"
            auth:
              - ".github/workflows/docker-publish.yml"
              - "apps/auth/**"
              - "apps/auth/Dockerfile"
              - "config.example.toml"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "turbo.json"

  frontend:
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'frontend'))
      || startsWith(github.ref, 'refs/tags/')
      || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache frontend build
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/frontend/.next/cache
          key: ${{ runner.os }}-frontend-cache-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'apps/frontend/package.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-frontend-cache-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'apps/frontend/package.json') }}-
            ${{ runner.os }}-frontend-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend artifact
        run: pnpm --filter @ink-battles/frontend build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ave-mygo/ink-battles-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  backend:
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'backend'))
      || startsWith(github.ref, 'refs/tags/')
      || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck backend
        run: pnpm --filter @ink-battles/backend build

      - name: Bundle backend artifact
        run: pnpm --filter @ink-battles/backend exec bun build src/index.ts --target=bun --outdir dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ave-mygo/ink-battles-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  auth:
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'auth'))
      || startsWith(github.ref, 'refs/tags/')
      || needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache auth panel build
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/auth/panel/.next/cache
          key: ${{ runner.os }}-auth-panel-cache-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'apps/auth/panel/package.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-auth-panel-cache-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'apps/auth/panel/package.json') }}-
            ${{ runner.os }}-auth-panel-cache-

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/auth/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/auth/Cargo.lock', 'apps/auth/Cargo.toml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('apps/auth/Cargo.lock', 'apps/auth/Cargo.toml') }}-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build auth panel artifact
        run: pnpm --filter @ink-battles/auth-panel build

      - name: Build auth service artifact
        working-directory: apps/auth
        run: cargo build --release

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract auth metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ave-mygo/ink-battles-auth
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/auth/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth
